<!DOCTYPE html>
<html>
<head>
  <title>Synced Video (Accurate)</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <h2>Synced Video Player</h2>

  <button onclick="createServer()">Host</button>
  <br><br>

  Join Code: <input id="joinCode">
  <button onclick="joinServer()">Join</button>

  <h3 id="info"></h3>

  <video id="video" width="480" controls>
    <source src="gandalph-sax.mp4" type="video/mp4">
  </video>

<script>
let peer;
let conns = [];
let isHost = false;

const video = document.getElementById("video");

// ---- CLIENT SYNC STATE ----
let latency = 0;
let timeOffset = 0;
let lastHostState = null;

// ---------------- HOST ----------------
function createServer() {
  isHost = true;
  peer = new Peer();

  peer.on('open', id => {
    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("info").innerText =
      "Join Code: " + id + "\n" + url;
  });

  peer.on('connection', conn => {
    conns.push(conn);

    conn.on('close', () => {
      conns = conns.filter(c => c !== conn);
    });

    conn.on('data', data => {
      if (data.type === "ping") {
        conn.send({
          type: "pong",
          hostTime: Date.now()
        });
      }
    });
  });

  setupHostControls();
  startBeacon();
}

function broadcast(data) {
  conns.forEach(c => { if (c.open) c.send(data); });
}

function setupHostControls() {
  video.addEventListener("play", () => sendState("play"));
  video.addEventListener("pause", () => sendState("pause"));
  video.addEventListener("seeked", () => sendState("seek"));
}

function sendState(type) {
  broadcast({
    type,
    time: video.currentTime,
    timestamp: Date.now()
  });
}

// send continuous sync updates (CRITICAL)
function startBeacon() {
  setInterval(() => {
    broadcast({
      type: "beacon",
      time: video.currentTime,
      paused: video.paused,
      timestamp: Date.now()
    });
  }, 1000); // every 1s
}

// ---------------- CLIENT ----------------
function joinServer(codeOverride=null) {
  const id = codeOverride || document.getElementById("joinCode").value;
  if (!id) return;

  peer = new Peer();

  peer.on('open', () => {
    const conn = peer.connect(id);

    conn.on('open', async () => {
      await measureLatency(conn);
      console.log("Latency:", latency, "Offset:", timeOffset);
    });

    conn.on('data', data => handleSync(data));
  });
}

// ---- latency + clock sync ----
function measureLatency(conn) {
  return new Promise(resolve => {
    const start = Date.now();

    function handler(data) {
      if (data.type === "pong") {
        const end = Date.now();

        latency = (end - start) / 2;
        timeOffset = data.hostTime - (start + latency);

        conn.off('data', handler);
        resolve();
      }
    }

    conn.on('data', handler);

    conn.send({ type: "ping" });
  });
}

// ---- sync handler ----
function handleSync(data) {
  if (!data) return;

  const now = Date.now();
  const hostNow = now + timeOffset;

  const elapsed = (hostNow - data.timestamp) / 1000;
  const targetTime = data.time + elapsed;

  if (data.type === "play") {
    video.currentTime = targetTime;
    video.play();
  }

  if (data.type === "pause") {
    video.currentTime = targetTime;
    video.pause();
  }

  if (data.type === "seek") {
    video.currentTime = targetTime;
  }

  if (data.type === "beacon") {
    lastHostState = {
      time: data.time,
      paused: data.paused,
      timestamp: data.timestamp
    };
  }
}

// ---- drift correction (smooth + hard snap) ----
setInterval(() => {
  if (!lastHostState) return;

  const now = Date.now();
  const hostNow = now + timeOffset;

  const elapsed = (hostNow - lastHostState.timestamp) / 1000;
  const expectedTime = lastHostState.time + elapsed;

  const diff = expectedTime - video.currentTime;

  // big desync → snap
  if (Math.abs(diff) > 0.5) {
    video.currentTime = expectedTime;
    return;
  }

  // small desync → smooth correction
  if (Math.abs(diff) > 0.05) {
    video.currentTime += diff * 0.2;
  }

  // pause/play sync
  if (lastHostState.paused && !video.paused) {
    video.pause();
  }
  if (!lastHostState.paused && video.paused) {
    video.play();
  }

}, 500);

// ---------------- AUTO JOIN ----------------
function getJoinCodeFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("join");
}

window.onload = () => {
  const code = getJoinCodeFromURL();
  if (code) {
    document.getElementById("joinCode").value = code;
    joinServer(code);
  }
};
</script>
</body>
</html>
