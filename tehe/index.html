<!DOCTYPE html>
<html>
<head>
  <title>Synced Video (Stable + Wake Lock)</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <h2>Synced Video Player</h2>

  <button onclick="createServer()">Host</button>
  <br><br>

  Join Code: <input id="joinCode">
  <button onclick="joinServer()">Join</button>

  <h3 id="info"></h3>

  <video id="video" width="480" controls>
    <source src="gandalph-sax.mp4" type="video/mp4">
  </video>

<script>
let peer;
let conns = [];
let isHost = false;

const video = document.getElementById("video");

// ---- CLIENT SYNC STATE ----
let latencySamples = [];
let latency = 0;
let timeOffset = 0;
let lastHostState = null;
let playLockUntil = 0;

// ---- WAKE LOCK ----
let wakeLock = null;
async function enableWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        console.log('Wake Lock released');
      });
      console.log('Wake Lock active');
    }
  } catch (err) {
    console.log('Wake Lock failed:', err);
  }
}
function disableWakeLock() {
  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
}
video.addEventListener("play", enableWakeLock);
video.addEventListener("pause", disableWakeLock);
video.addEventListener("ended", disableWakeLock);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && !video.paused) {
    enableWakeLock();
  }
});

// ---------------- HOST ----------------
function createServer() {
  isHost = true;
  peer = new Peer();

  peer.on('open', id => {
    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("info").innerText =
      "Join Code: " + id + "\n" + url;
  });

  peer.on('connection', conn => {
    conns.push(conn);

    conn.on('close', () => {
      conns = conns.filter(c => c !== conn);
    });

    conn.on('data', data => {
      if (data.type === "ping") {
        conn.send({
          type: "pong",
          hostTime: Date.now()
        });
      }
    });
  });

  setupHostControls();
  startBeacon();
}

function broadcast(data) {
  conns.forEach(c => { if (c.open) c.send(data); });
}

function setupHostControls() {
  video.addEventListener("play", () => sendState("play"));
  video.addEventListener("pause", () => sendState("pause"));
  video.addEventListener("seeked", () => sendState("seek"));
}

function sendState(type) {
  broadcast({
    type,
    time: video.currentTime,
    timestamp: Date.now()
  });
}

// beacon every 500ms
function startBeacon() {
  setInterval(() => {
    broadcast({
      type: "beacon",
      time: video.currentTime,
      paused: video.paused,
      timestamp: Date.now()
    });
  }, 500);
}

// ---------------- CLIENT ----------------
function joinServer(codeOverride=null) {
  const id = codeOverride || document.getElementById("joinCode").value;
  if (!id) return;

  peer = new Peer();

  peer.on('open', () => {
    const conn = peer.connect(id);

    conn.on('open', async () => {
      await measureLatency(conn);
    });

    conn.on('data', data => handleSync(data));
  });
}

// moving average latency
function measureLatency(conn) {
  return new Promise(resolve => {
    let count = 0;

    function ping() {
      const start = Date.now();

      function handler(data) {
        if (data.type === "pong") {
          const end = Date.now();
          const sample = (end - start) / 2;

          latencySamples.push(sample);
          if (latencySamples.length > 5) latencySamples.shift();

          latency = latencySamples.reduce((a,b)=>a+b,0) / latencySamples.length;
          timeOffset = data.hostTime - (start + latency);

          conn.off('data', handler);

          count++;
          if (count < 5) {
            setTimeout(ping, 100);
          } else {
            resolve();
          }
        }
      }

      conn.on('data', handler);
      conn.send({ type: "ping" });
    }

    ping();
  });
}

// ---- sync handler ----
function handleSync(data) {
  if (!data) return;

  const now = Date.now();
  const hostNow = now + timeOffset;

  const elapsed = (hostNow - data.timestamp) / 1000;
  const targetTime = data.time + elapsed;

  if (data.type === "play") {
    lastHostState = {
      time: data.time,
      paused: false,
      timestamp: data.timestamp
    };

    video.currentTime = targetTime;
    video.play().catch(()=>{});
    playLockUntil = now + 1000; // prevent correction for 1s
  }

  if (data.type === "pause") {
    lastHostState = {
      time: data.time,
      paused: true,
      timestamp: data.timestamp
    };
    video.currentTime = targetTime;
    video.pause();
  }

  if (data.type === "seek") {
    video.currentTime = targetTime;
  }

  if (data.type === "beacon") {
    lastHostState = {
      time: data.time,
      paused: data.paused,
      timestamp: data.timestamp
    };
  }
}

// ---- smooth drift correction ----
setInterval(() => {
  if (!lastHostState) return;

  const now = Date.now();

  // 🔑 lock after play
  if (!video.paused && now < playLockUntil) {
    video.playbackRate = 1;
    return;
  }

  const hostNow = now + timeOffset;
  const elapsed = (hostNow - lastHostState.timestamp) / 1000;
  const expectedTime = lastHostState.time + elapsed;

  const diff = expectedTime - video.currentTime;

  if (!video.paused) {
    if (Math.abs(diff) > 1.0) {
      video.currentTime = expectedTime;
    } else {
      let rate = 1 + diff * 0.4;
      rate = Math.max(0.98, Math.min(1.02, rate));
      video.playbackRate = rate;
    }
    return;
  }

  // paused → safe to seek
  if (Math.abs(diff) > 0.05) {
    video.currentTime = expectedTime;
  }

}, 250);

// ---------------- AUTO JOIN ----------------
function getJoinCodeFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("join");
}

window.onload = () => {
  const code = getJoinCodeFromURL();
  if (code) {
    document.getElementById("joinCode").value = code;
    joinServer(code);
  }
};
</script>
</body>
</html>
