<!DOCTYPE html>
<html>
<head>
  <title>Synced Video with Latency Compensation</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <h2>Synced Video Player</h2>

  <button onclick="createServer()">Host</button>
  <br><br>

  Join Code: <input id="joinCode">
  <button onclick="joinServer()">Join</button>

  <h3 id="myId"></h3>

  <video id="video" width="480" controls>
    <source src="gandalph-sax.mp4" type="video/mp4">
  </video>

<script>
let peer;
let conns = []; // all client connections
let isHost = false;
let video = document.getElementById("video");
let latency = 0;

// ---------------- HOST ----------------
function createServer() {
  isHost = true;
  peer = new Peer();

  peer.on('open', id => {
    document.getElementById("myId").innerText = "Join Code: " + id;
    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("myId").innerText += "\nShare this link: " + url;
  });

  peer.on('connection', connection => {
    conns.push(connection);

    connection.on('close', () => {
      conns = conns.filter(c => c !== connection);
    });

    // respond to ping for latency
    connection.on('data', data => {
      if (data.type === "ping") {
        connection.send({ type: "pong", timestamp: data.timestamp });
      }
    });
  });

  setupHostControls();
}

function setupHostControls() {
  video.addEventListener("play", () => broadcastVideo("play"));
  video.addEventListener("pause", () => broadcastVideo("pause"));
  video.addEventListener("seeked", () => broadcastVideo("seek"));
}

// broadcast video state to all clients with timestamp
function broadcastVideo(type) {
  const data = {
    type: type,
    time: video.currentTime,
    timestamp: Date.now() // send host timestamp
  };
  conns.forEach(c => { if(c.open) c.send(data); });
}

// ---------------- CLIENT ----------------
function joinServer(codeOverride=null) {
  const id = codeOverride || document.getElementById("joinCode").value;
  if (!id) return;

  peer = new Peer();

  peer.on('open', () => {
    const conn = peer.connect(id);

    conn.on('open', async () => {
      console.log("Connected to host");
      await measureLatency(conn);
    });

    conn.on('data', data => handleSync(data));
  });
}

// measure latency using ping-pong
function measureLatency(conn) {
  return new Promise(resolve => {
    const start = Date.now();
    conn.on('data', function onPong(data) {
      if(data.type === "pong") {
        latency = (Date.now() - start) / 2; // round-trip / 2
        console.log("Latency:", latency, "ms");
        conn.off('data', onPong);
        resolve();
      }
    });
    conn.send({ type: "ping", timestamp: start });
  });
}

// handle host commands, adjust for latency
function handleSync(data) {
  if (!data) return;

  let targetTime = data.time;

  if(data.timestamp) {
    // calculate approx host time + latency
    const now = Date.now();
    const delay = now - data.timestamp;
    targetTime += delay / 1000; // convert ms to seconds
  }

  if(data.type === "play") {
    video.currentTime = targetTime;
    video.play();
  }
  if(data.type === "pause") {
    video.currentTime = targetTime;
    video.pause();
  }
  if(data.type === "seek") {
    video.currentTime = targetTime;
  }
}

// ---------------- AUTO JOIN ----------------
function getJoinCodeFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("join");
}

window.onload = () => {
  const code = getJoinCodeFromURL();
  if (code) {
    document.getElementById("joinCode").value = code;
    joinServer(code);
  }
};
</script>
</body>
</html>
