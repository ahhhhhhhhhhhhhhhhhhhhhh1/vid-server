<!DOCTYPE html>
<html>
<head>
  <title>Smoother Synced Video</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<h2>Smoother Synced Video Player</h2>

<button onclick="createServer()">Host</button>
<br><br>

Join Code: <input id="joinCode">
<button id="joinBtn">Join</button>

<h3 id="myId"></h3>
<h4 id="status"></h4>

<video id="video" width="480" controls preload="auto">
  <source src="gandalph-sax.mp4" type="video/mp4">
</video>

<script>
let peer;
let conns = [];
let isHost = false;
const video = document.getElementById("video");
const status = document.getElementById("status");

function log(msg){ status.innerText = msg; }

// ---------------- HOST ----------------
function createServer(){
  isHost = true;
  peer = new Peer();

  peer.on('open', id=>{
    document.getElementById("myId").innerText = "Join Code: "+id;
    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("myId").innerText += "\nShare this link: "+url;
  });

  peer.on('connection', connection=>{
    conns.push(connection);
    connection.on('close', ()=>conns = conns.filter(c=>c!==connection));
    
    connection.on('data', data=>{
      if(data.type==='ping') connection.send({type:'pong'});
      if(data.type==='ready') checkAllReady();
    });

    pingClient(connection,5,avgPing=>{ connection.latency = avgPing; });
  });

  setupHostControls();
  setInterval(()=>{ if(!video.paused) sendState("sync"); },100);
}

function setupHostControls(){
  video.addEventListener("play", ()=>sendState("play"));
  video.addEventListener("pause", ()=>sendState("pause"));
  video.addEventListener("seeked", ()=>sendState("seek"));
}

function sendState(type){
  const hostTime = performance.now()/1000;
  const data = {type:type,time:video.currentTime,hostTime:hostTime,playing:!video.paused};
  conns.forEach(c=>{ if(c.open)c.send(data); });
}

// ---------------- CLIENT ----------------
document.getElementById("joinBtn").onclick = function(){
  const id = document.getElementById("joinCode").value;
  if(!id) return;

  peer = new Peer();
  peer.on('open', ()=>{
    const conn = peer.connect(id);
    conn.on('open', ()=>log("Connected to host"));
    conn.on('data', data=>handleClientData(data, conn));
    pingClient(conn,5,avgPing=>{
      conn.latency = avgPing;
      log("Estimated latency: "+avgPing.toFixed(1)+"ms");
      // only now preload video
      video.load();
      video.oncanplaythrough = ()=>{ conn.send({type:'ready'}); };
    });
  });
};

// ---------------- PING ----------------
function pingClient(conn,count,callback){
  let total=0,completed=0;
  function pingOnce(){
    const start = performance.now();
    conn.send({type:"ping"});
    conn.once("data", resp=>{
      if(resp.type==="pong"){
        total += performance.now() - start;
        completed++;
        if(completed<count) pingOnce();
        else callback(total/count);
      }
    });
  }
  pingOnce();
}

// ---------------- SYNC ----------------
function handleClientData(data, conn){
  if(!data) return;
  if(data.type==='ping'){ conn.send({type:'pong'}); return; }

  const latency = conn.latency ? conn.latency/1000 : 0.1;
  const now = performance.now()/1000;
  const targetTime = data.time + (now - data.hostTime) - latency;
  const diff = targetTime - video.currentTime;

  if(Math.abs(diff) > 0.3) video.currentTime = targetTime;
  else if(Math.abs(diff) > 0.05) video.playbackRate = 1 + diff*2;
  else video.playbackRate = 1;

  if(data.playing && video.paused) video.play();
  if(!data.playing && !video.paused) video.pause();
  if(data.type==='seek') video.currentTime = targetTime;
}

// ---------------- PRE-PLAY COUNTDOWN ----------------
function checkAllReady(){
  if(!isHost) return;
  const readyClients = conns.filter(c=>c.latency!==undefined).length;
  if(readyClients === conns.length){
    const startTime = performance.now()/1000 + 2; // 2s in future
    conns.forEach(c=>c.send({type:'start', time:startTime}));
    video.currentTime = 0;
    video.playbackRate = 1;
    setTimeout(()=>video.play(),2000);
  }
}

// ---------------- AUTO JOIN ----------------
window.onload = ()=>{
  const code = new URLSearchParams(window.location.search).get("join");
  if(code) document.getElementById("joinCode").value = code;
};
</script>
</body>
</html>
