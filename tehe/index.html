<!DOCTYPE html>
<html>
<head>
  <title>Smoother Synced Video</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<h2>Smoother Synced Video Player</h2>

<button onclick="createServer()">Host</button>
<br><br>

Join Code: <input id="joinCode">
<button onclick="joinServer()">Join</button>

<h3 id="myId"></h3>
<h4 id="status"></h4>

<video id="video" width="480" controls>
  <source src="gandalph-sax.mp4" type="video/mp4">
</video>

<script>
let peer;
let conns = [];
let isHost = false;
const video = document.getElementById("video");
const status = document.getElementById("status");

function log(msg){ status.innerText = msg; }
function getJoinCodeFromURL(){ return new URLSearchParams(window.location.search).get("join"); }

// --- HOST ---
function createServer(){
  isHost = true;
  peer = new Peer();

  peer.on('open', id=>{
    document.getElementById("myId").innerText = "Join Code: "+id;
    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("myId").innerText += "\nShare this link: "+url;
  });

  peer.on('connection', connection=>{
    conns.push(connection);
    connection.on('close', ()=>conns = conns.filter(c=>c!==connection));
    pingClient(connection,5,avgPing=>{
      connection.latency = avgPing;
      log("Client latency: "+avgPing.toFixed(1)+"ms");
    });
  });

  setupHostControls();
  setInterval(()=>{ if(!video.paused) sendState("sync"); },100);
}

function setupHostControls(){
  video.addEventListener("play", ()=>sendState("play"));
  video.addEventListener("pause", ()=>sendState("pause"));
  video.addEventListener("seeked", ()=>sendState("seek"));
}

function sendState(type){
  const hostTime = performance.now()/1000;
  const data = {type:type,time:video.currentTime,hostTime:hostTime,playing:!video.paused};
  conns.forEach(c=>{ if(c.open)c.send(data); });
}

// --- CLIENT ---
function joinServer(codeOverride=null){
  const id = codeOverride || document.getElementById("joinCode").value;
  if(!id) return;

  peer = new Peer();

  peer.on('open', ()=>{
    const conn = peer.connect(id);
    conn.on('open', ()=>log("Connected to host"));
    conn.on('data', data=>handleSync(data,conn));

    pingClient(conn,5,avgPing=>{
      conn.latency = avgPing;
      log("Estimated latency: "+avgPing.toFixed(1)+"ms");
    });
  });
}

// --- PING / LATENCY ---
function pingClient(conn,count,callback){
  let total=0,completed=0;
  function pingOnce(){
    const start = performance.now();
    conn.send({type:"ping"});
    conn.once("data",resp=>{
      if(resp.type==="pong"){
        total += performance.now() - start;
        completed++;
        if(completed<count) pingOnce();
        else callback(total/count);
      }
    });
  }
  pingOnce();
}

// --- SYNC HANDLER ---
function handleSync(data,conn){
  if(!data) return;
  if(data.type==="ping"){ conn.send({type:"pong"}); return; }

  const latency = conn && conn.latency ? conn.latency/1000 : 0.1;
  const now = performance.now()/1000;
  const offset = (now - data.hostTime) - latency;
  const targetTime = data.time + offset;

  const diff = targetTime - video.currentTime;

  // smooth aggressive correction
  if(Math.abs(diff) > 0.3){
    // very far behind, snap
    video.currentTime = targetTime;
  } else if(Math.abs(diff) > 0.05){
    // small drift, adjust playbackRate
    video.playbackRate = 1 + diff*2; // scales speed slightly
  } else {
    // almost synced
    video.playbackRate = 1;
  }

  // keep play/pause in sync
  if(data.type==="play" && video.paused) video.play();
  if(data.type==="pause" && !video.paused) video.pause();
  if(data.type==="seek") video.currentTime = targetTime;
}

// --- AUTO JOIN ---
window.onload = ()=>{
  const code = getJoinCodeFromURL();
  if(code){
    document.getElementById("joinCode").value = code;
    joinServer(code);
  }
};
</script>
</body>
</html>
