<!DOCTYPE html>
<html>
<head>
  <title>Synced Video</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<h2>Synced Video Player</h2>

<button onclick="createServer()">Host</button>
<br><br>

Join Code: <input id="joinCode">
<button onclick="joinServer()">Join</button>

<h3 id="myId"></h3>

<video id="video" width="480" controls>
  <source src="gandalph-sax.mp4" type="video/mp4">
</video>

<script>
let peer;
let conns = [];
let isHost = false;
const video = document.getElementById("video");

// --- Utils ---
function getJoinCodeFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("join");
}

// ---------------- HOST ----------------
function createServer() {
  isHost = true;
  peer = new Peer();

  peer.on('open', id => {
    document.getElementById("myId").innerText = "Join Code: " + id;
    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("myId").innerText += "\nShare this link: " + url;
  });

  peer.on('connection', connection => {
    conns.push(connection);
    connection.on('close', () => { conns = conns.filter(c => c !== connection); });

    // send current time immediately when new client joins
    connection.on('open', () => {
      connection.send({ type: "sync", time: video.currentTime, playing: !video.paused });
    });
  });

  setupHostControls();

  // Periodically send time updates for drift correction
  setInterval(() => {
    if (!video.paused) sendState("sync");
  }, 500); // every 0.5s
}

function sendState(type) {
  const data = { type: type, time: video.currentTime, playing: !video.paused };
  conns.forEach(c => { if (c.open) c.send(data); });
}

function setupHostControls() {
  video.addEventListener("play", () => sendState("play"));
  video.addEventListener("pause", () => sendState("pause"));
  video.addEventListener("seeked", () => sendState("seek"));
}

// ---------------- CLIENT ----------------
function joinServer(codeOverride = null) {
  const id = codeOverride || document.getElementById("joinCode").value;
  if (!id) return;

  peer = new Peer();

  peer.on('open', () => {
    const conn = peer.connect(id);

    conn.on('open', () => console.log("Connected to host"));
    conn.on('data', data => handleSync(data));
  });
}

// handle host commands and drift correction
function handleSync(data) {
  if (!data) return;

  const driftThreshold = 0.2; // seconds
  const currentTime = video.currentTime;

  if (data.type === "play") {
    if (Math.abs(currentTime - data.time) > driftThreshold) video.currentTime = data.time;
    if (video.paused) video.play();
  }

  if (data.type === "pause") {
    video.currentTime = data.time;
    if (!video.paused) video.pause();
  }

  if (data.type === "seek") {
    video.currentTime = data.time;
  }

  if (data.type === "sync") {
    // continuous drift correction
    const diff = data.time - currentTime;
    if (Math.abs(diff) > driftThreshold) {
      video.currentTime = data.time;
    }
    // optional: pause/play if host changed
    if (data.playing && video.paused) video.play();
    if (!data.playing && !video.paused) video.pause();
  }
}

// ---------------- AUTO JOIN ----------------
window.onload = () => {
  const code = getJoinCodeFromURL();
  if (code) {
    document.getElementById("joinCode").value = code;
    joinServer(code);
  }
};
</script>
</body>
</html>
