<!DOCTYPE html>
<html>
<head>
  <title>Synced Video</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <h2>Synced Video Player</h2>

  <button onclick="createServer()">Host</button>
  <h3 id="myId"></h3>

  <video id="video" width="480" controls>
    <source src="gandalph-sax.mp4" type="video/mp4">
  </video>

<script>
let peer;
let conn;
let isHost = false;
const video = document.getElementById("video");

function getJoinCodeFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("join");
}

function createServer() {
  isHost = true;
  peer = new Peer();

  peer.on('open', id => {
    document.getElementById("myId").innerText = "Join Code: " + id;

    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("myId").innerText += "\nLink: " + url;
  });

  peer.on('connection', connection => {
    conn = connection;
    setupHostControls();
  });
}

function joinServer(code) {
  peer = new Peer();

  peer.on('open', () => {
    conn = peer.connect(code);

    conn.on('open', () => {
      console.log("Connected to host");
    });

    conn.on('data', data => {
      handleSync(data);
    });
  });
}

function setupHostControls() {
  video.addEventListener("play", () => sendState("play"));
  video.addEventListener("pause", () => sendState("pause"));
  video.addEventListener("seeked", () => sendState("seek"));
}

function sendState(type) {
  if (!conn) return;

  conn.send({
    type: type,
    time: video.currentTime
  });
}

function handleSync(data) {
  if (!data) return;

  if (data.type === "play") {
    video.currentTime = data.time;
    video.play();
  }

  if (data.type === "pause") {
    video.currentTime = data.time;
    video.pause();
  }

  if (data.type === "seek") {
    video.currentTime = data.time;
  }
}

// AUTO JOIN ON LOAD IF URL HAS CODE
window.onload = () => {
  const code = getJoinCodeFromURL();
  if (code) {
    joinServer(code); // auto-connect immediately
  }
};
</script>
</body>
</html>
