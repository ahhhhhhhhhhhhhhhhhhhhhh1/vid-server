<!DOCTYPE html>
<html>
<head>
  <title>Ultra-Synced Video</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<h2>Ultra-Synced Video Player</h2>

<button onclick="createServer()">Host</button>
<br><br>

Join Code: <input id="joinCode">
<button onclick="joinServer()">Join</button>

<h3 id="myId"></h3>

<video id="video" width="480" controls>
  <source src="gandalph-sax.mp4" type="video/mp4">
</video>

<script>
let peer;
let conns = [];
let isHost = false;
const video = document.getElementById("video");
const driftWindow = []; // sliding window for drift smoothing

// ---------------- UTILS ----------------
function getJoinCodeFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("join");
}

// ---------------- HOST ----------------
function createServer() {
  isHost = true;
  peer = new Peer();

  peer.on('open', id => {
    document.getElementById("myId").innerText = "Join Code: " + id;
    const url = window.location.origin + window.location.pathname + "?join=" + id;
    document.getElementById("myId").innerText += "\nShare this link: " + url;
  });

  peer.on('connection', connection => {
    conns.push(connection);
    connection.on('close', () => { conns = conns.filter(c => c !== connection); });

    // immediate sync on join
    connection.on('open', () => {
      connection.send({
        type: "init",
        time: video.currentTime,
        playing: !video.paused,
        timestamp: Date.now()
      });
    });
  });

  setupHostControls();

  // ultra-fast periodic sync
  setInterval(() => {
    if (!video.paused) broadcastSync();
  }, 100); // every 100ms
}

function broadcastSync() {
  const timestamp = Date.now();
  const data = { type: "sync", time: video.currentTime, playing: !video.paused, timestamp };
  conns.forEach(c => { if (c.open) c.send(data); });
}

function setupHostControls() {
  video.addEventListener("play", () => broadcastSync());
  video.addEventListener("pause", () => broadcastSync());
  video.addEventListener("seeked", () => broadcastSync());
}

// ---------------- CLIENT ----------------
function joinServer(codeOverride = null) {
  const id = codeOverride || document.getElementById("joinCode").value;
  if (!id) return;

  peer = new Peer();

  peer.on('open', () => {
    const conn = peer.connect(id);

    conn.on('open', () => console.log("Connected to host"));
    conn.on('data', data => handleSync(data));
  });
}

function handleSync(data) {
  if (!data) return;

  const clientTime = video.currentTime;
  const hostTime = data.time;

  if (data.type === "init") {
    // start with small buffer for everyone
    video.currentTime = hostTime;
    if (data.playing) setTimeout(() => video.play(), 150); 
  }

  if (data.type === "play") {
    if (video.paused) video.play();
    video.currentTime = hostTime;
  }

  if (data.type === "pause") {
    if (!video.paused) video.pause();
    video.currentTime = hostTime;
  }

  if (data.type === "seek") {
    video.currentTime = hostTime;
  }

  if (data.type === "sync") {
    // calculate network latency
    const now = Date.now();
    const latency = (now - data.timestamp)/1000; // seconds
    const targetTime = data.time + latency;

    // drift smoothing
    const drift = targetTime - clientTime;
    driftWindow.push(drift);
    if (driftWindow.length > 5) driftWindow.shift();
    const avgDrift = driftWindow.reduce((a,b)=>a+b,0)/driftWindow.length;

    // smooth playback rate adjustment
    if (Math.abs(avgDrift) > 0.05) {
      if (avgDrift > 0.2) video.playbackRate = 1.05;
      else if (avgDrift < -0.2) video.playbackRate = 0.95;
      else video.playbackRate = 1;
    } else {
      video.playbackRate = 1;
    }

    // auto pause/play if host state changed
    if (data.playing && video.paused) video.play();
    if (!data.playing && !video.paused) video.pause();
  }
}

// ---------------- AUTO JOIN ----------------
window.onload = () => {
  const code = getJoinCodeFromURL();
  if (code) {
    document.getElementById("joinCode").value = code;
    joinServer(code);
  }
};
</script>
</body>
</html>
